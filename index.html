<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="羽球排場" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>羽球排場 2x2 / 3x3</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <style>
    :root{
      --bg:#ecfeff;
      --panel:#ffffff;
      --ink:#0f172a;
      --muted:#475569;
      --line:#cbd5e1;
      --brand:#0f766e;
      --brand2:#14b8a6;
      --danger:#dc2626;
      --warn:#f59e0b;
      --ok:#16a34a;
      --chip:#fef3c7;
      --shadow:0 12px 32px rgba(15,23,42,.18);
      --radius:18px;
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;margin:0;overscroll-behavior:none;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;}
    body{min-height:100vh;min-height:100dvh;touch-action:manipulation;}
    button,input,select{font:inherit}
    button{cursor:pointer;border:0;border-radius:14px;min-height:48px;font-weight:800;background:#e2e8f0;color:#0f172a;padding:10px 14px;}
    button:active{transform:translateY(1px)}
    button.primary{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff}
    button.danger{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
    button.warn{background:#fef3c7;color:#92400e;border:1px solid #fde68a}
    button.ghost{background:#f8fafc;border:1px solid var(--line)}
    button.small{min-height:40px;padding:8px 10px;font-size:16px;border-radius:12px}
    button.cancel-select-strong{background:#dc2626;color:#fff;border:2px solid #991b1b;}
    input,select{width:100%;min-height:48px;border:1px solid var(--line);border-radius:14px;padding:10px 12px;background:#fff;color:var(--ink);font-size:18px;}
    label{font-weight:800;font-size:16px;color:#334155;display:block;margin:6px 0 4px}
    .app-shell{min-height:100vh;min-height:100dvh;max-width:1366px;margin:0 auto;padding:8px 12px calc(12px + var(--safe-bottom));}
    .app-header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:8px 10px 10px;position:sticky;top:0;background:linear-gradient(180deg,rgba(236,254,255,.98),rgba(236,254,255,.86));z-index:10;backdrop-filter:blur(8px)}
    .title-wrap{display:flex;align-items:baseline;gap:10px;min-width:0;}
    .app-title{font-size:clamp(23px,2.4vw,34px);font-weight:950;letter-spacing:.02em;white-space:nowrap;}
    .version{font-size:clamp(15px,1.4vw,20px);font-weight:900;color:#0f766e;white-space:nowrap;}
    .status-line{font-size:clamp(14px,1.2vw,18px);font-weight:800;color:#475569;text-align:right;}
    .selected-banner{display:none;position:fixed;left:12px;right:12px;top:max(8px,env(safe-area-inset-top,0px));align-items:center;justify-content:space-between;gap:10px;min-height:54px;padding:8px 12px;border:2px solid #facc15;background:rgba(254,249,195,.98);border-radius:16px;font-size:18px;font-weight:900;box-shadow:0 8px 18px rgba(250,204,21,.2);z-index:48;backdrop-filter:blur(8px)}
    .selected-banner.show{display:flex}
    .selected-banner #selectedText{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .selected-banner button{flex:0 0 auto;}
    .app-header,.section-title{display:none;}
    .board-section{margin:0 0 8px;}
    .section-title{display:none;}
    .zone-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;}
    .zone-row.mode-2{grid-template-columns:repeat(2,minmax(0,1fr));}
    .zone-card{background:rgba(255,255,255,.96);border:1px solid #bae6fd;border-radius:var(--radius);box-shadow:0 10px 22px rgba(15,23,42,.1);padding:8px;min-width:0;}
    .zone-head{width:100%;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px;border:1px solid #99f6e4;background:linear-gradient(135deg,#0f766e,#14b8a6);color:#fff;border-radius:14px;min-height:44px;padding:8px 10px;text-align:left;}
    .zone-head.warn{background:linear-gradient(135deg,#92400e,#f59e0b);border-color:#facc15;}
    .zone-head:active{transform:translateY(1px)}
    .zone-title{font-size:clamp(18px,2vw,25px);font-weight:950;color:#0f172a;white-space:nowrap;}
    .zone-head .zone-title,.zone-head .zone-count{color:#fff;}
    .zone-count{font-size:15px;color:#64748b;font-weight:800;white-space:nowrap;}
    .slot-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));grid-template-rows:repeat(2,1fr);gap:8px;min-height:132px;min-height:clamp(132px,21vh,214px);min-height:clamp(132px,21dvh,214px);}
    .slot{border:2px dashed #94a3b8;border-radius:16px;background:#f8fafc;min-height:54px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
    .slot.empty::after{content:"點此放入";color:#94a3b8;font-weight:900;font-size:clamp(14px,1.5vw,20px)}
    .zone-action{display:none;}
    .player-chip{position:relative;width:100%;height:100%;min-height:54px;border-radius:15px;border:3px solid rgba(255,255,255,.95);box-shadow:0 4px 10px rgba(15,23,42,.18);display:flex;align-items:center;justify-content:center;padding:8px 8px 6px;overflow:hidden;color:#0f172a;user-select:none;cursor:pointer;}
    .player-chip.selected{transform:scale(.96);border-color:#111827;box-shadow:inset 0 0 0 3px #fff,0 4px 12px rgba(15,23,42,.25);}
    .player-chip.selected::after{content:"✓";position:absolute;top:4px;right:6px;z-index:3;width:24px;height:24px;border-radius:999px;background:#111827;color:#fff;font-size:16px;font-weight:1000;line-height:24px;text-align:center;}
    .player-chip .games{position:absolute;top:4px;left:6px;z-index:1;background:rgba(255,255,255,.95);border:1px solid rgba(15,23,42,.18);border-radius:999px;min-width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:clamp(15px,1.8vw,22px);font-weight:1000;line-height:1;padding:0 6px;}
    .player-chip .name{position:relative;z-index:2;text-align:center;font-weight:1000;line-height:1.05;letter-spacing:.02em;font-size:clamp(20px,2.6vw,34px);max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 2px;}
    .rest-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:8px;}
    .rest-list .player-chip{min-height:52px;}
    .rest-list .player-chip .name{font-size:22px;}
    .floating-button{position:fixed;left:12px;top:45vh;top:45dvh;width:64px;height:64px;border-radius:999px;background:linear-gradient(135deg,#0f766e,#06b6d4);color:#fff;font-size:28px;font-weight:1000;display:flex;align-items:center;justify-content:center;z-index:50;box-shadow:var(--shadow);touch-action:none;user-select:none;}
    .floating-button.has-selected{background:linear-gradient(135deg,#f59e0b,#facc15);color:#422006;}
    .float-panel{position:fixed;z-index:49;top:12px;right:12px;width:420px;width:min(420px,calc(100vw - 24px));max-height:calc(100vh - 24px);max-height:calc(100dvh - 24px);background:#ffffff;border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);display:none;overflow:hidden;}
    .float-panel.open{display:flex;flex-direction:column;}
    .panel-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:12px 12px;border-bottom:1px solid var(--line);background:#f8fafc;}
    .panel-title{font-size:22px;font-weight:1000;}
    .panel-title .version-inline{font-size:16px;color:#0f766e;}
    .close-strong{background:#dc2626!important;color:#fff!important;border:2px solid #7f1d1d!important;min-width:50px;}
    .panel-body{padding:12px;overflow:auto;padding-bottom:calc(18px + var(--safe-bottom));}
    .quick-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:12px;}
    .quick-grid .wide-action{grid-column:1 / -1;min-height:96px;font-size:24px;}
    .panel-section{border:1px solid #e2e8f0;border-radius:18px;background:#fff;margin:10px 0;padding:12px;}
    .panel-section h3{margin:0 0 10px;font-size:19px;font-weight:1000;color:#0f766e;}
    .collapse-head{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;background:#f8fafc;color:#0f766e;border:1px solid #e2e8f0;border-radius:14px;margin-bottom:10px;text-align:left;font-size:24px;font-weight:1000;}
    .collapse-head::after{content:"🔼";font-size:16px;color:#475569;margin-left:auto;}
    .panel-section.collapsed .collapse-head::after{content:"🔽";}
    .panel-section.collapsed .collapsible-body{display:none;}
    .button-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;}
    .button-grid.single{grid-template-columns:1fr;}
    .help{font-size:14px;line-height:1.35;color:#64748b;font-weight:700;margin:6px 0 0;}
    .mode-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .mode-row button.active{background:#0f766e;color:#fff}
    .toggle-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .toggle-row button.active{background:#0f766e;color:#fff}
    .color-grid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:8px;margin:8px 0 10px;}
    .color-swatch{position:relative;min-height:42px;border-radius:12px;border:3px solid #fff;box-shadow:0 0 0 1px rgba(15,23,42,.2);padding:0;transition:transform .15s ease,box-shadow .15s ease;}
    .color-swatch.active{transform:scale(1.08);border-color:#fff;box-shadow:0 0 0 3px #111827,0 0 0 6px #fff,0 6px 14px rgba(15,23,42,.22);}
    .color-swatch.active::after{content:"✓";position:absolute;top:-9px;right:-9px;width:22px;height:22px;border-radius:999px;background:#111827;color:#fff;font-size:15px;font-weight:1000;line-height:22px;text-align:center;}
    .mode-status{font-weight:900;color:#334155;margin:4px 0 8px;}
    .toast{position:fixed;left:50%;bottom:calc(18px + var(--safe-bottom));transform:translateX(-50%) translateY(120px);opacity:0;background:#0f172a;color:#fff;border-radius:999px;padding:12px 18px;font-weight:900;font-size:17px;z-index:80;box-shadow:var(--shadow);max-width:calc(100vw - 24px);text-align:center;transition:.25s ease;}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
    .debug-panel{display:none;position:fixed;left:8px;right:8px;bottom:calc(8px + var(--safe-bottom));z-index:95;background:#111827;color:#fff;border:2px solid #facc15;border-radius:12px;padding:8px 10px;font:700 13px/1.35 monospace;white-space:pre-wrap;box-shadow:var(--shadow);}
    .modal-mask{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:70;display:none;align-items:center;justify-content:center;padding:18px;}
    .modal-mask.show{display:flex;}
    .modal-card{width:min(520px,100%);background:#fff;border-radius:22px;padding:18px;box-shadow:var(--shadow);}
    .modal-card h3{margin:0 0 10px;font-size:24px;}
    .modal-card p{margin:8px 0;color:#475569;font-weight:750;line-height:1.45;}
    .modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;}
    .portrait-warning{display:none;position:fixed;inset:0;z-index:100;background:linear-gradient(135deg,#0f766e,#0f172a);color:#fff;align-items:center;justify-content:center;padding:26px;text-align:center;}
    .portrait-card{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.35);border-radius:26px;padding:28px;box-shadow:var(--shadow);}
    .portrait-card .big{font-size:34px;font-weight:1000;margin-bottom:12px;}
    .portrait-card .small{font-size:20px;font-weight:800;line-height:1.4;opacity:.95;}
    .file-input{display:none}
    .backup-summary{background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:10px;margin-top:8px;font-weight:800;line-height:1.55;color:#334155;}
    @media (max-width:900px) and (orientation:landscape){
      .app-shell{padding:6px 8px calc(10px + var(--safe-bottom));}
      .app-header{padding:4px 6px 6px;}
      .zone-row{gap:6px;}
      .selected-banner{left:8px;right:8px;min-height:48px;padding:6px 8px;font-size:15px;border-radius:13px;}
      .selected-banner #selectedText{white-space:normal;line-height:1.2;}
      .selected-banner button{min-height:36px;font-size:14px;padding:5px 8px;}
      .zone-card{padding:6px;border-radius:14px;}
      .zone-head{min-height:38px;padding:6px 8px;margin-bottom:5px;border-radius:12px;}
      .slot-grid{gap:5px;min-height:136px;}
      .slot{border-radius:12px;min-height:48px;}
      .zone-title{font-size:18px}.zone-count{font-size:12px}
      .player-chip{min-height:48px;border-radius:12px;border-width:2px;}
      .player-chip .name{font-size:clamp(17px,3vw,25px)}
      .player-chip .games{min-width:22px;height:22px;font-size:15px;top:3px;left:4px;}
      .floating-button{width:56px;height:56px;font-size:24px;}
      .float-panel{left:8px;right:8px;top:auto;bottom:calc(8px + var(--safe-bottom));width:auto;max-height:85vh;max-height:85dvh;border-radius:20px;}
      .panel-body{padding-bottom:calc(16px + var(--safe-bottom));}
    }
    @media (max-width:700px) and (orientation:portrait){
      .portrait-warning.phone{display:flex;}
    }
    @media (min-width:701px) and (orientation:portrait){
      .app-shell{max-width:900px;}
      .zone-row{grid-template-columns:repeat(3,minmax(0,1fr));}
    }
    @media (min-width:1367px){
      .app-shell{max-width:1500px}.slot-grid{min-height:196px}.float-panel{width:460px}
    }
  </style>
</head>
<body>
  <div class="portrait-warning phone">
    <div class="portrait-card">
      <div class="big">請將手機轉為橫向使用</div>
      <div class="small">橫向後會顯示完整排場畫面</div>
    </div>
  </div>

  <main class="app-shell" id="appShell">
    <div class="selected-banner" id="selectedBanner">
      <div id="selectedText">已選取</div>
      <button class="small cancel-select-strong" id="cancelSelectBtn">取消選取</button>
    </div>

    <section class="board-section">
      <div class="zone-row" id="courtRow"></div>
    </section>

    <section class="board-section">
      <div class="zone-row" id="nextRow"></div>
    </section>
  </main>

  <button class="floating-button" id="floatButton" aria-label="管理員工具">•••</button>

  <aside class="float-panel" id="floatPanel" aria-label="浮點管理員面板">
    <div class="panel-head">
      <div class="panel-title" id="panelTitle">管理員工具</div>
      <button class="small close-strong" id="closePanelBtn">×</button>
    </div>
    <div class="panel-body" id="panelBody">
      <div class="quick-grid">
        <button class="warn wide-action" id="moveRestBtn">回到休息區</button>
        <button class="primary" id="repeatCallBtn">再叫一次</button>
      </div>

      <div id="panelHint" class="backup-summary">未選取球員。可從場地或休息區點選人名。</div>

      <section class="panel-section" id="restSection">
        <button class="collapse-head" data-collapse-target="restSectionBody" type="button" id="restSectionHead">休息區 0人</button>
        <div class="collapsible-body" id="restSectionBody">
          <div class="help">點選球員後，面板會自動縮小，接著點 Court / Next 空格放入。</div>
          <div class="rest-list" id="restList"></div>
        </div>
      </section>

      <section class="panel-section" id="adminSection">
        <button class="collapse-head" data-collapse-target="adminSectionBody" type="button" id="adminSectionHead">Admin</button>
        <div class="collapsible-body" id="adminSectionBody">
          <div id="adminLoginBox">
            <label>管理員密碼</label>
            <input id="adminPasswordInput" type="password" inputmode="numeric" placeholder="" />
            <button class="primary" id="adminLoginBtn" style="width:100%;margin-top:8px">登入</button>
          </div>
          <div id="adminTools" style="display:none">
            <div class="backup-summary">管理員模式已開啟</div>

            <div class="panel-section">
              <button class="collapse-head" data-collapse-target="autoCallBody" type="button">自動呼叫</button>
              <div class="collapsible-body" id="autoCallBody">
            <div class="toggle-row">
              <button id="autoCallOffBtn">關閉</button>
              <button id="autoCallOnBtn">開啟</button>
            </div>
              <label>語速</label>
              <select id="voiceRateSelect"><option value="slow">慢</option><option value="normal">正常</option><option value="fast">快</option></select>
              <label>音調</label>
              <select id="voicePitchSelect"><option value="low">低</option><option value="normal">正常</option><option value="high">高</option></select>
              <label>語音</label>
              <select id="voiceLangSelect"><option value="auto">自動</option><option value="zh-TW-first">中文優先</option></select>
              <div class="button-grid" style="margin-top:8px">
                <button id="voiceTestBtn">語音設定 / 試播</button>
                <button id="saveVoiceBtn">儲存設定</button>
              </div>
              </div>
            </div>

          <div class="panel-section">
            <button class="collapse-head" data-collapse-target="playerManageBody" type="button">球員管理</button>
            <div class="collapsible-body" id="playerManageBody">
              <label>新增球員</label>
              <input id="newPlayerInput" type="text" placeholder="輸入姓名" />
              <label>貼紙底色</label>
              <div class="color-grid" id="newPlayerColorGrid" aria-label="新增球員貼紙底色"></div>
              <button class="primary" id="addPlayerBtn" style="width:100%;margin-top:8px">新增球員</button>
              <label>修改選取球員姓名</label>
              <input id="renamePlayerInput" type="text" placeholder="先選取球員" />
              <div class="button-grid" style="margin-top:8px">
                <button id="renamePlayerBtn">修改姓名</button>
                <button class="danger" id="deletePlayerBtn">刪除球員</button>
              </div>
            </div>
          </div>

          <div class="panel-section">
            <button class="collapse-head" data-collapse-target="gamesManageBody" type="button">場次管理</button>
            <div class="collapsible-body" id="gamesManageBody">
              <div class="button-grid">
                <button class="warn" id="plusGameBtn">選取 +1</button>
                <button class="warn" id="minusGameBtn">選取 -1</button>
                <button class="warn" id="zeroPlayerBtn">選取歸零</button>
                <button class="danger" id="resetAllGamesBtn">全部場次歸零</button>
              </div>
            </div>
          </div>

          <div class="panel-section">
            <button class="collapse-head" data-collapse-target="systemOpsBody" type="button">系統操作</button>
            <div class="collapsible-body" id="systemOpsBody">
              <div class="button-grid single">
                <div class="mode-row">
                  <button id="freeModeBtn">自由暢打</button>
                  <button id="autoModeBtn">自動排場</button>
                </div>
                <button class="primary" id="randomFillBtn">隨機填滿場地</button>
                <button class="warn" id="resetTodayBtn">今日重新開始</button>
                <button id="exportBackupBtn">匯出球員名單 JSON</button>
                <button id="importBackupBtn">匯入球員名單 JSON</button>
                <button id="exportLogBtn">匯出今日紀錄 CSV</button>
                <button class="danger" id="clearAllBtn">清空全部資料</button>
                <div id="courtModeControls">
                  <div class="mode-status" id="courtModeStatus">目前模式：3x3</div>
                  <div class="mode-row">
                    <button id="use3x3Btn">使用 3x3</button>
                    <button id="use2x2Btn">使用 2x2</button>
                  </div>
                </div>
              </div>
              <input class="file-input" id="importFileInput" type="file" accept=".json,application/json" />
              <div class="help">匯入球員名單會清空目前 Court / Next，並把球員放回休息區。</div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </aside>

  <div class="toast" id="toast"></div>
  <div class="debug-panel" id="debugPanel"></div>

  <div class="modal-mask" id="modalMask">
    <div class="modal-card">
      <h3 id="modalTitle">確認</h3>
      <p id="modalMessage">確定？</p>
      <div id="modalExtra"></div>
      <div class="modal-actions">
        <button class="ghost" id="modalCancelBtn">取消</button>
        <button class="primary" id="modalOkBtn">確認</button>
      </div>
    </div>
  </div>

<script>
(() => {
  'use strict';

  const APP_VERSION = '1.0.3-ipad';
  const STORAGE_KEY = 'badminton3x3.ipad.v1.state';
  const ADMIN_UNLOCK_KEY = STORAGE_KEY + '.adminUnlockedDate';
  const DEBUG_MODE = location.search.indexOf('debug=1') >= 0;
  const COURTS = ['court1','court2','court3'];
  const NEXTS = ['next1','next2','next3'];
  const SLOTS = [1,2,3,4];
  const COLORS = ['#bfdbfe','#bbf7d0','#fde68a','#fecaca','#ddd6fe','#fed7aa','#bae6fd','#fbcfe8','#ccfbf1','#e9d5ff','#d9f99d','#fef3c7'];
  const DEFAULT_COLLAPSED_SECTIONS = ['restSectionBody','adminSectionBody','autoCallBody','playerManageBody','gamesManageBody','systemOpsBody'];

  let state = loadState();
  let selectedPlayer = null;
  let isAdmin = false;
  let panelOpen = false;
  let collapsedSections = new Set(state.settings.collapsedSections || DEFAULT_COLLAPSED_SECTIONS);
  let selectedNewPlayerColor = COLORS[0];
  let floatingDrag = { active:false, moved:false, dx:0, dy:0 };
  let lastTouchHandledAt = 0;

  const $ = (id) => document.getElementById(id);

  function nowIso(){ return new Date().toISOString(); }
  function pad(n){ return String(n).padStart(2,'0'); }
  function todayKey(){
    const d = new Date();
    return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
  }
  function localStamp(){
    const d = new Date();
    return d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+'-'+pad(d.getHours())+pad(d.getMinutes());
  }
  function uid(prefix){ return prefix + Date.now().toString(36) + Math.random().toString(36).slice(2,7).toUpperCase(); }
  function clone(obj){ return JSON.parse(JSON.stringify(obj)); }
  function escapeHtml(str){
    return String(str == null ? '' : str).replace(/[&<>'"]/g, function(m){ return {'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]; });
  }
  function debugLog(action, details){
    if(!DEBUG_MODE) return;
    const el = $('debugPanel');
    if(!el) return;
    el.style.display = 'block';
    const p = selectedPlayer ? getPlayer(selectedPlayer.playerId) : null;
    const selected = p ? p.name + ' @ ' + p.zone + (p.slot ? ':' + p.slot : '') : 'none';
    el.textContent = [
      'V ' + APP_VERSION,
      'action: ' + action,
      'selected: ' + selected,
      'detail: ' + details
    ].join('\n');
  }
  function closestByClass(el, className){
    while(el && el !== document){
      if(el.classList && el.classList.contains(className)) return el;
      el = el.parentNode;
    }
    return null;
  }
  function closestById(el, id){
    while(el && el !== document){
      if(el.id === id) return el;
      el = el.parentNode;
    }
    return null;
  }
  function dataAttr(el, name){
    return el && el.getAttribute ? el.getAttribute('data-' + name) : null;
  }
  function bindTap(el, handler){
    let lastTouch = 0;
    function run(e){
      if(e.type === 'click' && Date.now() - lastTouch < 600) return;
      if(e.type === 'touchend'){
        lastTouch = Date.now();
        if(e.cancelable) e.preventDefault();
      }
      if(e.stopPropagation) e.stopPropagation();
      handler(e);
    }
    el.addEventListener('touchend', run, false);
    el.addEventListener('click', run, false);
  }
  function setTap(el, handler){
    if(!el) return;
    el.__tapHandler = handler;
    if(el.__tapBound) return;
    bindTap(el, function(e){
      if(el.__tapHandler) el.__tapHandler(e);
    });
    el.__tapBound = true;
  }
  function clearTap(el){
    if(el) el.__tapHandler = null;
  }
  function isOldIosSafari(){
    const ua = navigator.userAgent || '';
    const match = ua.match(/OS (\d+)_/);
    return /iPad|iPhone|iPod/.test(ua) && match && Number(match[1]) <= 12;
  }
  function isAdminUnlocked(){
    try{ return localStorage.getItem(ADMIN_UNLOCK_KEY) === todayKey(); }
    catch(err){ return false; }
  }
  function saveAdminUnlock(){
    try{ localStorage.setItem(ADMIN_UNLOCK_KEY, todayKey()); }
    catch(err){}
  }
  function clearAdminUnlock(){
    try{ localStorage.removeItem(ADMIN_UNLOCK_KEY); }
    catch(err){}
  }

  function defaultState(){
    return {
      app:'badminton-court-2x2-3x3-ipad',
      version:APP_VERSION,
      createdAt:nowIso(),
      updatedAt:nowIso(),
      players:[],
      settings:{
        courtCount:3,
        nextCount:3,
        playersPerCourt:4,
        adminPassword:'1111',
        freePlayMode:false,
        autoArrangeMode:true,
        autoCallEnabled:false,
        voiceRate:'normal',
        voicePitch:'normal',
        voiceLang:'zh-TW-first',
        lastCallPlayers:[],
        lastCallCourt:null,
        floating:{ side:'left', y:0.45 },
        collapsedSections:DEFAULT_COLLAPSED_SECTIONS.slice()
      },
      gameLog:[]
    };
  }

  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return defaultState();
      const data = JSON.parse(raw);
      return normalizeState(data);
    }catch(err){
      console.error(err);
      return defaultState();
    }
  }

  function normalizeState(data){
    const base = defaultState();
    const merged = Object.assign(base, data || {});
    merged.settings = Object.assign(base.settings, data && data.settings ? data.settings : {});
    merged.settings.courtCount = Number(merged.settings.courtCount) === 2 ? 2 : 3;
    merged.settings.nextCount = merged.settings.courtCount;
    merged.settings.collapsedSections = Array.isArray(merged.settings.collapsedSections)
      ? merged.settings.collapsedSections.filter(id => DEFAULT_COLLAPSED_SECTIONS.includes(id))
      : DEFAULT_COLLAPSED_SECTIONS.slice();
    merged.players = Array.isArray(data && data.players ? data.players : null) ? data.players : [];
    merged.gameLog = Array.isArray(data && data.gameLog ? data.gameLog : null) ? data.gameLog : [];
    merged.players.forEach((p, i) => {
      p.id = p.id || uid('P');
      p.name = p.name || '未命名';
      p.games = Number.isFinite(Number(p.games)) ? Math.max(0, Number(p.games)) : 0;
      p.color = p.color || COLORS[i % COLORS.length];
      p.zone = validZone(p.zone) ? p.zone : 'rest';
      p.slot = p.zone === 'rest' ? null : Number(p.slot) || null;
      p.sortOrder = Number.isFinite(Number(p.sortOrder)) ? Number(p.sortOrder) : i + 1;
      p.isActive = p.isActive !== false;
      p.createdAt = p.createdAt || nowIso();
      p.updatedAt = p.updatedAt || nowIso();
    });
    merged.version = APP_VERSION;
    merged.updatedAt = nowIso();
    return merged;
  }

  function saveState(){
    state.updatedAt = nowIso();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function validZone(zone){ return zone === 'rest' || COURTS.includes(zone) || NEXTS.includes(zone); }
  function activeCourts(){ return COURTS.slice(0, Number(state.settings.courtCount) === 2 ? 2 : 3); }
  function activeNexts(){ return NEXTS.slice(0, Number(state.settings.nextCount) === 2 ? 2 : 3); }
  function currentMode(){ return Number(state.settings.courtCount) === 2 ? '2x2' : '3x3'; }
  function boardPlayers(){ return activePlayers().filter(p => COURTS.includes(p.zone) || NEXTS.includes(p.zone)); }
  function isBoardEmpty(){ return boardPlayers().length === 0; }
  function getPlayer(id){ return state.players.find(p => p.id === id && p.isActive !== false) || null; }
  function activePlayers(){ return state.players.filter(p => p.isActive !== false); }
  function zonePlayers(zone){ return activePlayers().filter(p => p.zone === zone).sort((a,b) => (a.slot || 99) - (b.slot || 99)); }
  function restPlayers(){ return activePlayers().filter(p => p.zone === 'rest').sort((a,b) => (a.games - b.games) || (a.sortOrder - b.sortOrder)); }
  function occupant(zone, slot){ return activePlayers().find(p => p.zone === zone && Number(p.slot) === Number(slot)) || null; }
  function zoneLabel(zone){
    if(zone === 'rest') return '休息區';
    if(zone.startsWith('court')) return 'Court ' + zone.replace('court','');
    if(zone.startsWith('next')) return 'Next ' + zone.replace('next','');
    return zone;
  }

  function logAction(action, zone, players, note){
    state.gameLog.push({ logId:uid('L'), time:nowIso(), action, zone, players:Array.isArray(players)?players:[], note:note || '' });
    if(state.gameLog.length > 1000) state.gameLog = state.gameLog.slice(-1000);
  }

  function showToast(msg){
    const el = $('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(showToast.timer);
    showToast.timer = setTimeout(() => el.classList.remove('show'), 2200);
  }

  function confirmDialog(title, message, extraHtml=''){
    return new Promise((resolve) => {
      $('modalTitle').textContent = title;
      $('modalMessage').textContent = message;
      $('modalExtra').innerHTML = extraHtml;
      $('modalMask').classList.add('show');
      const cleanup = (answer) => {
        $('modalMask').classList.remove('show');
        $('modalOkBtn').onclick = null;
        $('modalCancelBtn').onclick = null;
        resolve(answer);
      };
      $('modalOkBtn').onclick = () => cleanup(true);
      $('modalCancelBtn').onclick = () => cleanup(false);
    });
  }

  function alertDialog(title, message, extraHtml=''){
    return new Promise((resolve) => {
      $('modalTitle').textContent = title;
      $('modalMessage').textContent = message;
      $('modalExtra').innerHTML = extraHtml;
      $('modalCancelBtn').style.display = 'none';
      $('modalOkBtn').textContent = '知道了';
      $('modalMask').classList.add('show');
      const cleanup = () => {
        $('modalMask').classList.remove('show');
        $('modalCancelBtn').style.display = '';
        $('modalOkBtn').textContent = '確認';
        $('modalOkBtn').onclick = null;
        resolve();
      };
      $('modalOkBtn').onclick = cleanup;
    });
  }

  function resetModalButtons(){
    $('modalCancelBtn').style.display = '';
    $('modalCancelBtn').textContent = '取消';
    $('modalOkBtn').textContent = '確認';
    $('modalOkBtn').onclick = null;
    $('modalCancelBtn').onclick = null;
    clearTap($('modalOkBtn'));
    clearTap($('modalCancelBtn'));
  }

  function closeModal(){
    $('modalMask').classList.remove('show');
    $('modalExtra').innerHTML = '';
    resetModalButtons();
  }

  function confirmDialog(title, message, extraHtml=''){
    return new Promise((resolve) => {
      resetModalButtons();
      $('modalTitle').textContent = title;
      $('modalMessage').textContent = message;
      $('modalExtra').innerHTML = extraHtml;
      $('modalMask').classList.add('show');
      setTap($('modalOkBtn'), () => { closeModal(); resolve(true); });
      setTap($('modalCancelBtn'), () => { closeModal(); resolve(false); });
    });
  }

  function alertDialog(title, message, extraHtml=''){
    return new Promise((resolve) => {
      resetModalButtons();
      $('modalTitle').textContent = title;
      $('modalMessage').textContent = message;
      $('modalExtra').innerHTML = extraHtml;
      $('modalCancelBtn').style.display = 'none';
      $('modalOkBtn').textContent = '知道了';
      $('modalMask').classList.add('show');
      setTap($('modalOkBtn'), () => { closeModal(); resolve(); });
    });
  }

  function playerChipHtml(p){
    const selected = selectedPlayer && selectedPlayer.playerId === p.id ? ' selected' : '';
    return `<div class="player-chip${selected}" data-player-id="${escapeHtml(p.id)}" style="background:${escapeHtml(p.color)}"><div class="games">${Number(p.games)||0}</div><div class="name">${escapeHtml(p.name)}</div></div>`;
  }

  function render(){
    if(console.time) console.time('render');
    renderHeader();
    renderZones();
    renderSelectedBanner();
    renderPanel();
    saveState();
    if(console.timeEnd) console.timeEnd('render');
  }

  function renderHeader(){
    return;
  }

  function renderZones(){
    $('courtRow').classList.toggle('mode-2', activeCourts().length === 2);
    $('nextRow').classList.toggle('mode-2', activeNexts().length === 2);
    $('courtRow').innerHTML = activeCourts().map(z => renderZoneCard(z, true)).join('');
    $('nextRow').innerHTML = activeNexts().map(z => renderZoneCard(z, false)).join('');
  }

  function renderZoneCard(zone, isCourt){
    const players = zonePlayers(zone);
    const title = zoneLabel(zone);
    const slots = SLOTS.map(slot => {
      const p = occupant(zone, slot);
      const content = p ? playerChipHtml(p) : '';
      return `<div class="slot ${p?'filled':'empty'}" data-zone="${zone}" data-slot="${slot}">${content}</div>`;
    }).join('');
    const actionClass = isCourt ? 'warn' : '';
    const actionData = isCourt ? `data-court="${zone}"` : `data-next="${zone}"`;
    return `<div class="zone-card"><button class="zone-head ${actionClass}" ${actionData} type="button"><div class="zone-title">${title}</div><div class="zone-count">${players.length}/4</div></button><div class="slot-grid">${slots}</div></div>`;
  }

  function renderSelectedBanner(){
    const banner = $('selectedBanner');
    const btn = $('floatButton');
    if(selectedPlayer){
      const p = getPlayer(selectedPlayer.playerId);
      if(!p){ selectedPlayer = null; renderSelectedBanner(); return; }
      banner.classList.add('show');
      $('selectedText').textContent = `已選取：${p.name}｜目前位置：${zoneLabel(p.zone)}${p.slot ? ' 第 '+p.slot+' 格' : ''}｜請點選場地空格放入`;
      btn.classList.add('has-selected');
    }else{
      banner.classList.remove('show');
      btn.classList.remove('has-selected');
    }
  }

  function renderPanel(){
    const p = selectedPlayer ? getPlayer(selectedPlayer.playerId) : null;
    const hint = $('panelHint');
    if(p){
      hint.textContent = p.zone === 'rest'
        ? `已選取：${p.name}。請點選 Court / Next 空格放入。`
        : `已選取：${p.name}。可按「回到休息區」或點其他格交換。`;
      $('moveRestBtn').style.display = p.zone === 'rest' ? 'none' : '';
    }else{
      hint.textContent = '未選取球員。可從場地或休息區點選人名。';
      $('moveRestBtn').style.display = 'none';
    }
    $('panelTitle').innerHTML = isAdmin ? `羽球排場 ${currentMode()} <span class="version-inline">| V ${APP_VERSION}</span>` : '管理員工具';
    renderRestList();
    renderAdminUi();
    renderColorPicker();
    renderCollapsedSections();
  }

  function renderRestList(){
    const players = restPlayers();
    $('restSectionHead').textContent = `休息區 ${players.length}人`;
    $('restList').innerHTML = players.length
      ? players.map(playerChipHtml).join('')
      : '<div class="help">休息區目前沒有人</div>';
  }

  function renderAdminUi(){
    $('adminSectionHead').textContent = isAdmin ? 'Admin 已登入' : 'Admin';
    $('adminLoginBox').style.display = isAdmin ? 'none' : '';
    $('adminTools').style.display = isAdmin ? '' : 'none';
    $('freeModeBtn').classList.toggle('active', !!state.settings.freePlayMode);
    $('autoModeBtn').classList.toggle('active', !!state.settings.autoArrangeMode);
    $('autoCallOffBtn').classList.toggle('active', !state.settings.autoCallEnabled);
    $('autoCallOnBtn').classList.toggle('active', !!state.settings.autoCallEnabled);
    if($('courtModeStatus')) $('courtModeStatus').textContent = `目前模式：${currentMode()}`;
    if($('use3x3Btn')) $('use3x3Btn').classList.toggle('active', currentMode() === '3x3');
    if($('use2x2Btn')) $('use2x2Btn').classList.toggle('active', currentMode() === '2x2');
    $('voiceRateSelect').value = state.settings.voiceRate || 'normal';
    $('voicePitchSelect').value = state.settings.voicePitch || 'normal';
    $('voiceLangSelect').value = state.settings.voiceLang || 'zh-TW-first';
    const p = selectedPlayer ? getPlayer(selectedPlayer.playerId) : null;
    $('renamePlayerInput').value = p ? p.name : '';
  }

  function renderColorPicker(){
    const grid = $('newPlayerColorGrid');
    if(!grid) return;
    grid.innerHTML = COLORS.map(color => {
      const active = color === selectedNewPlayerColor ? ' active' : '';
      return `<button class="color-swatch${active}" type="button" data-color="${escapeHtml(color)}" style="background:${escapeHtml(color)}" aria-label="選擇顏色 ${escapeHtml(color)}"></button>`;
    }).join('');
  }

  function renderCollapsedSections(){
    const buttons = document.querySelectorAll('[data-collapse-target]');
    for(let i = 0; i < buttons.length; i += 1){
      const btn = buttons[i];
      const body = $(dataAttr(btn, 'collapse-target'));
      const section = closestByClass(btn, 'panel-section');
      if(!body || !section) continue;
      section.classList.toggle('collapsed', collapsedSections.has(body.id));
    }
  }

  function saveCollapsedSections(){
    state.settings.collapsedSections = Array.from(collapsedSections);
    saveState();
  }

  function selectPlayer(playerId, options={}){
    if(selectedPlayer && selectedPlayer.playerId === playerId){
      clearSelected('已取消選取');
      return;
    }
    const p = getPlayer(playerId);
    if(!p) return;
    selectedPlayer = { playerId:p.id, name:p.name, fromZone:p.zone, fromSlot:p.slot == null ? null : p.slot };
    showToast(`已選取：${p.name}`);
    if(options.closePanelAfterSelect){ closePanel(); }
    render();
  }

  function clearSelected(reason){
    selectedPlayer = null;
    if(reason) showToast(reason);
    render();
  }

  function movePlayer(playerId, targetZone, targetSlot){
    const p = getPlayer(playerId);
    if(!p || !validZone(targetZone)) return false;
    const oldZone = p.zone;
    const oldSlot = p.slot;

    if(targetZone === 'rest'){
      p.zone = 'rest';
      p.slot = null;
      p.updatedAt = nowIso();
      logAction('moveToRest','rest',[p.name],`${zoneLabel(oldZone)} → 休息區`);
      saveState();
      return true;
    }

    targetSlot = Number(targetSlot);
    if(!SLOTS.includes(targetSlot)) return false;
    const target = occupant(targetZone, targetSlot);
    if(target && target.id !== p.id){
      target.zone = oldZone;
      target.slot = oldZone === 'rest' ? null : oldSlot;
      target.updatedAt = nowIso();
    }
    p.zone = targetZone;
    p.slot = targetSlot;
    p.updatedAt = nowIso();
    logAction('movePlayer',targetZone,[p.name],`${zoneLabel(oldZone)} → ${zoneLabel(targetZone)} #${targetSlot}`);
    saveState();
    return true;
  }

  async function courtDown(courtZone){
    const players = zonePlayers(courtZone);
    if(players.length === 0){ showToast('這個球場目前沒有人'); return; }
    const modeNote = state.settings.autoArrangeMode
      ? '自動排場模式：場次 +1 後，Next 1 先上場並向前遞補，下場人員再排入 Next 空格。'
      : '自由暢打模式：此球場人員場次會 +1 並回到休息區。';
    const countNote = players.length < 4 ? `<div class="backup-summary">提醒：${zoneLabel(courtZone)} 目前未滿 4 人，仍會照樣下場。</div>` : '';
    const ok = await confirmDialog('確認下場', `${zoneLabel(courtZone)} 下場？${modeNote}`, `${countNote}<div class="backup-summary">${players.map(p=>escapeHtml(p.name)).join('、')}</div>`);
    if(!ok) return;
    players.forEach(p => { p.games = (Number(p.games)||0)+1; p.updatedAt=nowIso(); });
    if(state.settings.autoArrangeMode){
      await autoArrangeCourtDown(courtZone, players);
    }else{
      players.forEach(p => { p.zone='rest'; p.slot=null; p.updatedAt=nowIso(); });
      logAction('courtDown',courtZone,players.map(p=>p.name),'下場並場次 +1');
    }
    if(selectedPlayer && players.some(p => p.id === selectedPlayer.playerId)) selectedPlayer = null;
    saveState();
    showToast(`${zoneLabel(courtZone)} 已下場`);
    render();
  }

  async function autoArrangeCourtDown(courtZone, players){
    players.forEach(p => { p.zone='rest'; p.slot=null; p.updatedAt=nowIso(); });
    await autoNextUpToCourt('next1', courtZone, true);
    const sorted = shuffleTiesByGames(players);
    const nextSlots = emptySlots(activeNexts());
    const placed = [];
    const overflow = [];
    sorted.forEach((p, i) => {
      const target = nextSlots[i];
      if(target){
        p.zone = target.zone;
        p.slot = target.slot;
        placed.push(p.name);
      }else{
        p.zone = 'rest';
        p.slot = null;
        overflow.push(p.name);
      }
      p.updatedAt = nowIso();
    });
    logAction('autoCourtDown',courtZone,sorted.map(p=>p.name),`下場 +1，排入 Next：${placed.join('、') || '無'}${overflow.length ? '；回休息區：' + overflow.join('、') : ''}`);
    if(overflow.length){
      await alertDialog('Next 空位不足', 'Next 空位不足，已依規則能放幾個放幾個，剩下回休息區。', `<div class="backup-summary">回休息區：${overflow.map(escapeHtml).join('、')}</div>`);
    }
  }

  function emptySlots(zones){
    const slots = [];
    zones.forEach(zone => SLOTS.forEach(slot => {
      if(!occupant(zone, slot)) slots.push({zone, slot});
    }));
    return slots;
  }

  function shuffleTiesByGames(players){
    return players
      .map(p => ({p, tie:Math.random()}))
      .sort((a,b) => ((Number(a.p.games)||0) - (Number(b.p.games)||0)) || (a.tie - b.tie))
      .map(item => item.p);
  }

  function firstEmptyCourt(){
    return activeCourts().find(z => zonePlayers(z).length === 0) || null;
  }

  async function confirmPartialNextUp(nextZone, count){
    if(count >= 4) return true;
    return await confirmDialog('Next 未滿 4 人', `${zoneLabel(nextZone)} 目前只有 ${count}/4 人，仍要上場嗎？`, '');
  }

  async function nextUp(nextZone){
    const players = zonePlayers(nextZone);
    if(players.length === 0){ showToast('這組 Next 沒有人'); return; }
    const court = firstEmptyCourt();
    if(!court){ await alertDialog('目前沒有空球場', '沒有完全空的 Court，所有位置不動。'); return; }
    if(state.settings.autoArrangeMode){
      await autoNextUpToCourt(nextZone, court, false);
      saveState();
      render();
      return;
    }
    if(!(await confirmPartialNextUp(nextZone, players.length))) return;
    const sorted = players.sort((a,b)=>(a.slot||99)-(b.slot||99));
    sorted.forEach((p,i) => { p.zone = court; p.slot = i+1; p.updatedAt = nowIso(); });
    const names = sorted.map(p=>p.name);
    state.settings.lastCallPlayers = names;
    state.settings.lastCallCourt = court;
    logAction('nextUp',court,names,`${zoneLabel(nextZone)} 上場到 ${zoneLabel(court)}`);
    saveState();
    showToast(`${zoneLabel(nextZone)} 已上場`);
    render();
    if(state.settings.autoCallEnabled) callPlayers(names, court);
  }

  async function autoNextUpToCourt(nextZone, court, fromCourtDown){
    const players = zonePlayers(nextZone);
    if(players.length === 0){
      if(fromCourtDown) await alertDialog('Next 1 無人上場', '下場後 Next 1 沒有人可自動上場，剛空出的 Court 保持空場。');
      return false;
    }
    if(!(await confirmPartialNextUp(nextZone, players.length))) return false;
    const sorted = players.sort((a,b)=>(a.slot||99)-(b.slot||99));
    sorted.forEach((p,i) => { p.zone = court; p.slot = i+1; p.updatedAt = nowIso(); });
    const names = sorted.map(p=>p.name);
    state.settings.lastCallPlayers = names;
    state.settings.lastCallCourt = court;
    shiftNextForwardAfter(nextZone);
    logAction('autoNextUp',court,names,`${zoneLabel(nextZone)} 上場到 ${zoneLabel(court)}，Next 向前遞補`);
    showToast(`${zoneLabel(nextZone)} 已上場`);
    if(state.settings.autoCallEnabled) callPlayers(names, court);
    return true;
  }

  function shiftNextForwardAfter(nextZone){
    const nexts = activeNexts();
    const start = nexts.indexOf(nextZone);
    if(start < 0) return;
    for(let i=start + 1;i<nexts.length;i++){
      const from = nexts[i];
      const to = nexts[i - 1];
      zonePlayers(from).forEach(p => {

  async function randomFillCourts(){
    const empty = [];
    activeCourts().concat(activeNexts()).forEach(z => SLOTS.forEach(slot => { if(!occupant(z, slot)) empty.push({zone:z, slot}); }));
    if(empty.length === 0){ await alertDialog('場地已滿', 'Court 與 Next 都已滿，所有位置不動。'); return; }
    const rest = restPlayers();
    if(rest.length === 0){ showToast('休息區目前沒有人'); return; }
    const shuffled = rest.slice().sort(() => Math.random() - 0.5);
    const count = Math.min(empty.length, shuffled.length);
    const moved = [];
    for(let i=0;i<count;i++){
      const p = shuffled[i];
      p.zone = empty[i].zone;
      p.slot = empty[i].slot;
      p.updatedAt = nowIso();
      moved.push(p.name);
    }
    logAction('randomFillCourts','courts-next',moved,'隨機填滿 Court 與 Next 空格');
    saveState();
    render();
    if(count < shuffled.length) await alertDialog('場地已滿', '場地已滿，剩餘人員留在休息區。');
    else if(count < empty.length) showToast('休息區人數不足，已填入可用球員');
    else showToast('已隨機填滿場地');
  }

  function callPlayers(names, courtZone=null){
    if(!Array.isArray(names) || !names.length){ showToast('目前沒有可呼叫的人員'); return; }
    state.settings.lastCallPlayers = names.slice();
    state.settings.lastCallCourt = courtZone || null;
    saveState();
    const courtName = courtVoiceName(courtZone);
    const text = courtName ? `${names.join('、')} 請上${courtName}` : '請上場：' + names.join('、');
    try{
      if(window.speechSynthesis && window.speechSynthesis.cancel) window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      const rate = state.settings.voiceRate;
      const pitch = state.settings.voicePitch;
      utter.rate = rate === 'slow' ? 0.78 : rate === 'fast' ? 1.18 : 0.95;
      utter.pitch = pitch === 'low' ? 0.82 : pitch === 'high' ? 1.18 : 1;
      utter.lang = 'zh-TW';
      if(state.settings.voiceLang === 'zh-TW-first'){
        const voices = window.speechSynthesis && window.speechSynthesis.getVoices ? window.speechSynthesis.getVoices() : [];
        const zh = voices.find(v => /zh|Chinese|Taiwan|Mandarin/i.test(v.lang + ' ' + v.name));
        if(zh) utter.voice = zh;
      }
      if(window.speechSynthesis && window.speechSynthesis.speak) window.speechSynthesis.speak(utter);
    }catch(err){ console.error(err); }
  }

  function readFileText(file){
    return new Promise(function(resolve, reject){
      if(typeof file.text === 'function'){
        file.text().then(resolve).catch(reject);
        return;
      }
      const reader = new FileReader();
      reader.onload = function(){ resolve(String(reader.result || '')); };
      reader.onerror = function(){ reject(reader.error || new Error('read file failed')); };
      reader.readAsText(file);
    });
  }

  function initFloatingButton(){
    const btn = $('floatButton');
    const pos = state.settings.floating || {side:'left', y:0.45};
    const y = Math.max(74, Math.min(window.innerHeight - 82, window.innerHeight * (Number(pos.y)||0.45)));
    btn.style.top = y + 'px';
    btn.style.left = pos.side === 'right' ? 'auto' : '12px';
    btn.style.right = pos.side === 'right' ? '12px' : 'auto';

    function pointFromEvent(e){
      const touch = e.touches && e.touches.length ? e.touches[0] : (e.changedTouches && e.changedTouches.length ? e.changedTouches[0] : e);
      return {x:touch.clientX, y:touch.clientY};
    }
    function startDrag(e){
      const point = pointFromEvent(e);
      floatingDrag = {active:true, moved:false, dx:point.x - btn.getBoundingClientRect().left, dy:point.y - btn.getBoundingClientRect().top};
      if(btn.setPointerCapture && e.pointerId != null) btn.setPointerCapture(e.pointerId);
    }
    function moveDrag(e){
      if(!floatingDrag.active) return;
      const point = pointFromEvent(e);
      floatingDrag.moved = true;
      const x = Math.max(4, Math.min(window.innerWidth - btn.offsetWidth - 4, point.x - floatingDrag.dx));
      const y2 = Math.max(54, Math.min(window.innerHeight - btn.offsetHeight - 8, point.y - floatingDrag.dy));
      btn.style.left = x + 'px'; btn.style.right = 'auto'; btn.style.top = y2 + 'px';
      if(e.cancelable) e.preventDefault();
    }
    function endDrag(e){
      if(!floatingDrag.active) return;
      if(btn.releasePointerCapture && e.pointerId != null) btn.releasePointerCapture(e.pointerId);
      floatingDrag.active = false;
      snapFloatingButton();
      setTimeout(function(){ floatingDrag.moved = false; }, 0);
    }
    btn.addEventListener('pointerdown', startDrag);
    btn.addEventListener('pointermove', moveDrag);
    btn.addEventListener('pointerup', endDrag);
    btn.addEventListener('touchstart', startDrag, {passive:false});
    btn.addEventListener('touchmove', moveDrag, {passive:false});
    btn.addEventListener('touchend', endDrag);
    btn.addEventListener('mousedown', startDrag);
    document.addEventListener('mousemove', moveDrag);
    document.addEventListener('mouseup', endDrag);
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      if(floatingDrag.moved) return;
      panelOpen ? closePanel() : openPanel();
    });
  }

  function snapFloatingButton(){
    const btn = $('floatButton');
    const rect = btn.getBoundingClientRect();
    const side = rect.left + rect.width/2 < window.innerWidth/2 ? 'left' : 'right';
    btn.style.left = side === 'left' ? '12px' : 'auto';
    btn.style.right = side === 'right' ? '12px' : 'auto';
    const y = Math.max(54, Math.min(window.innerHeight - rect.height - 8, rect.top));
    btn.style.top = y + 'px';
    state.settings.floating = {side, y: y / window.innerHeight};
    saveState();
  }

  async function handleBoardInteraction(e){
    const zoneHead = closestByClass(e.target, 'zone-head');
    if(zoneHead && dataAttr(zoneHead, 'court')){
      if(e.cancelable) e.preventDefault();
      e.stopPropagation();
      debugLog('zone-head courtDown', dataAttr(zoneHead, 'court'));
      await courtDown(dataAttr(zoneHead, 'court'));
      return true;
    }
    if(zoneHead && dataAttr(zoneHead, 'next')){
      if(e.cancelable) e.preventDefault();
      e.stopPropagation();
      debugLog('zone-head nextUp', dataAttr(zoneHead, 'next'));
      await nextUp(dataAttr(zoneHead, 'next'));
      return true;
    }

    const slot = closestByClass(e.target, 'slot');
    if(slot){
      if(e.cancelable) e.preventDefault();
      e.stopPropagation();
      const chipInSlot = closestByClass(e.target, 'player-chip');
      if(!selectedPlayer){
        if(chipInSlot){
          debugLog('slot select chip', dataAttr(chipInSlot, 'player-id') + ' -> ' + dataAttr(slot, 'zone') + ':' + dataAttr(slot, 'slot'));
          selectPlayer(dataAttr(chipInSlot, 'player-id'), {closePanelAfterSelect:false});
        }else{
          debugLog('slot empty no selected', dataAttr(slot, 'zone') + ':' + dataAttr(slot, 'slot'));
          showToast('請先點選球員');
        }
        return true;
      }
      const targetZone = dataAttr(slot, 'zone');
      const targetSlot = Number(dataAttr(slot, 'slot'));
      const moved = movePlayer(selectedPlayer.playerId, targetZone, targetSlot);
      if(moved){
        debugLog('slot move success', selectedPlayer.playerId + ' -> ' + targetZone + ':' + targetSlot);
        selectedPlayer = null;
        showToast('已移動');
        render();
      }else{
        debugLog('slot move fail', selectedPlayer.playerId + ' -> ' + targetZone + ':' + targetSlot);
        showToast('移動失敗');
      }
      return true;
    }

    const chip = closestByClass(e.target, 'player-chip');
    if(chip){
      if(e.cancelable) e.preventDefault();
      e.stopPropagation();
      const inRest = !!closestById(chip, 'restList');
      debugLog(inRest ? 'chip rest select' : 'chip board select', dataAttr(chip, 'player-id'));
      selectPlayer(dataAttr(chip, 'player-id'), {closePanelAfterSelect:inRest});
      return true;
    }
    return false;
  }

  function bindEvents(){
    function isBoardTarget(target){
      return !!(closestByClass(target, 'zone-head') || closestByClass(target, 'slot') || closestByClass(target, 'player-chip'));
    }
    function runBoardInteraction(e){
      if(e.type === 'touchend' && isBoardTarget(e.target)){
        lastTouchHandledAt = Date.now();
        if(e.cancelable) e.preventDefault();
      }
      handleBoardInteraction(e).catch(function(err){
        console.error(err);
        debugLog('board action error', err && err.message ? err.message : String(err));
        showToast('操作失敗，請重試');
      });
    }
    document.addEventListener('touchend', runBoardInteraction, false);
    document.addEventListener('click', (e) => {
      if(Date.now() - lastTouchHandledAt < 500) return;
      runBoardInteraction(e);
    });

    function moveSelectedToRest(){
      const p = selectedPlayer ? getPlayer(selectedPlayer.playerId) : null;
      if(!p){ showToast('請先選球員'); return; }
      if(p.zone === 'rest'){ showToast('已在休息區'); return; }
      if(movePlayer(p.id,'rest',null)){ selectedPlayer = null; showToast('已回休息區'); render(); }
    }
    function adminLogin(){
      if($('adminPasswordInput').value !== state.settings.adminPassword){
        showToast('密碼錯誤');
        return;
      }
      isAdmin = true;
      saveAdminUnlock();
      $('adminPasswordInput').value='';
      collapsedSections.delete('adminSectionBody');
      saveCollapsedSections();
      showToast('已登入');
      renderPanel();
    }
    function tap(id, handler){
      const el = $(id);
      if(el) setTap(el, handler);
    }

    tap('cancelSelectBtn', () => clearSelected('已取消選取'));
    tap('closePanelBtn', closePanel);
    tap('repeatCallBtn', repeatLastCall);
    tap('moveRestBtn', moveSelectedToRest);
    tap('adminLoginBtn', adminLogin);
    tap('freeModeBtn', () => { state.settings.freePlayMode=true; state.settings.autoArrangeMode=false; saveState(); renderPanel(); });
    tap('autoModeBtn', () => { state.settings.freePlayMode=false; state.settings.autoArrangeMode=true; saveState(); showToast('已切換'); renderPanel(); });
    tap('randomFillBtn', randomFillCourts);
    tap('autoCallOffBtn', () => { state.settings.autoCallEnabled=false; saveState(); renderPanel(); });
    tap('autoCallOnBtn', () => { state.settings.autoCallEnabled=true; saveState(); renderPanel(); });
    tap('voiceTestBtn', () => callPlayers(['測試','請上場']));
    tap('saveVoiceBtn', saveVoiceSettings);
    tap('addPlayerBtn', () => addPlayer($('newPlayerInput').value));
    $('newPlayerInput').addEventListener('keydown', e => { if(e.key==='Enter') addPlayer($('newPlayerInput').value); });
    tap('renamePlayerBtn', renameSelected);
    tap('deletePlayerBtn', deleteSelected);
    tap('plusGameBtn', () => adjustSelectedGames(1));
    tap('minusGameBtn', () => adjustSelectedGames(-1));
    tap('zeroPlayerBtn', zeroSelectedGames);
    tap('resetAllGamesBtn', resetAllGames);
    tap('resetTodayBtn', resetToday);
    tap('clearAllBtn', clearAll);
    tap('use3x3Btn', () => setCourtMode(3));
    tap('use2x2Btn', () => setCourtMode(2));
    tap('exportBackupBtn', exportJson);
    tap('exportLogBtn', exportLogCsv);
    tap('importBackupBtn', showImportPasteDialog);
    $('importFileInput').addEventListener('change', function(e){ handleImportFile(e.target.files && e.target.files[0] ? e.target.files[0] : null); });
    setTap($('newPlayerColorGrid'), (e) => {
      const swatch = closestByClass(e.target, 'color-swatch');
      if(!swatch) return;
      selectedNewPlayerColor = dataAttr(swatch, 'color') || COLORS[0];
      renderColorPicker();
    });
    const collapseButtons = document.querySelectorAll('[data-collapse-target]');
    for(let i = 0; i < collapseButtons.length; i += 1){
      const btn = collapseButtons[i];
      setTap(btn, () => {
        const target = dataAttr(btn, 'collapse-target');
        if(collapsedSections.has(target)) collapsedSections.delete(target);
        else collapsedSections.add(target);
        saveCollapsedSections();
        renderCollapsedSections();
      });
    }

    let resizeTimer = null;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => { snapFloatingButton(); }, 150);
    });
  }

  function registerServiceWorker(){
    if('serviceWorker' in navigator){
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(console.warn);
      });
    }
  }

  function simplifyLabels(){
    if($('exportBackupBtn')) $('exportBackupBtn').textContent = '複製名單 JSON';
    if($('importBackupBtn')) $('importBackupBtn').textContent = '貼上名單 JSON';
    if($('resetTodayBtn')) $('resetTodayBtn').textContent = '今日重新開始';
  }

  function exposeDebugApi(){
    if(!DEBUG_MODE) return;
    window.__badmintonIpadV1 = {
      getState:function(){ return clone(state); },
      setState:function(nextState){
        state = normalizeState(nextState || {});
        selectedPlayer = null;
        saveState();
        render();
      },
      tap:function(id){
        const el = $(id);
        if(!el) throw new Error('missing element ' + id);
        const event = {
          type:'touchend',
          target:el,
          cancelable:true,
          preventDefault:function(){},
          stopPropagation:function(){}
        };
        el.dispatchEvent(event);
      },
      handleBoardInteraction:handleBoardInteraction,
      courtDown:courtDown,
      nextUp:nextUp,
      resetToday:resetToday,
      clearAll:clearAll,
      importPlayersFromText:importPlayersFromText,
      exportJson:exportJson,
      exportLogCsv:exportLogCsv
    };
  }

  function init(){
    isAdmin = isAdminUnlocked();
    simplifyLabels();
    bindEvents();
    initFloatingButton();
    render();
    exposeDebugApi();
    registerServiceWorker();
  }

  init();
})();
</script>
</body>
</html>
